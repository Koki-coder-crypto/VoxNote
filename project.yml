name: VoxNote
options:
  bundleIdPrefix: com.voxnote
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"

settings:
  base:
    SWIFT_VERSION: "5.9"
    ALWAYS_SEARCH_USER_PATHS: NO
    CLANG_ENABLE_MODULES: YES
    ENABLE_TESTABILITY: NO

targets:
  VoxNote:
    type: application
    platform: iOS
    sources:
      - path: ios_app
        type: group
    settings:
      base:
        PRODUCT_NAME: VoxNote
        PRODUCT_BUNDLE_IDENTIFIER: com.voxnote.app
        INFOPLIST_FILE: ios_app/Info.plist
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: $(DEVELOPMENT_TEAM)
        ANTHROPIC_API_KEY: $(ANTHROPIC_API_KEY)
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
    entitlements:
      path: ios_app/VoxNote.entitlements
      properties:
        com.apple.developer.in-app-payments:
          - com.voxnote.app.pro.monthly
          - com.voxnote.app.pro.annual
          - com.voxnote.app.lifetime
    capabilities:
      - microphone
      - speech-recognition
      - in-app-purchase
